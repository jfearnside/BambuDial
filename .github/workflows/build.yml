name: Build Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ESP-IDF Build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: esp32s3

      - name: Prepare release artifacts
        run: |
          mkdir -p firmware
          cp build/bootloader/bootloader.bin firmware/
          cp build/partition_table/partition-table.bin firmware/
          cp build/ota_data_initial.bin firmware/
          cp build/bambu_monitor.bin firmware/

      - name: Copy firmware to docs for GitHub Pages
        run: |
          cp firmware/*.bin docs/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/*
          generate_release_notes: true

      - name: Deploy GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
